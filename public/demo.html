<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>転居届申請（デモ）</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 40px 24px;
      background: #f9fafb;
      color: #1f2937;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 32px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }
    #submit-btn {
      margin-top: 8px;
      background: #3b82f6;
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    #submit-btn:hover { background: #2563eb; }
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 24px 0;
    }
  </style>
</head>
<body>
  <h1>転居届 オンライン申請</h1>
  <p class="subtitle">引越し後14日以内に手続きを行ってください</p>

  <div class="card">
    <div class="form-group">
      <label for="postal-code">郵便番号 <span style="color:#ef4444">*</span></label>
      <input type="text" id="postal-code" placeholder="例: 1234567" maxlength="7">
    </div>

    <div class="form-group">
      <label for="mynumber-input">マイナンバー <span style="color:#ef4444">*</span></label>
      <input type="text" id="mynumber-input" placeholder="12桁の番号">
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="name-input">氏名 <span style="color:#ef4444">*</span></label>
      <input type="text" id="name-input" placeholder="山田 太郎">
    </div>

    <div class="form-group">
      <label for="address-input">新住所 <span style="color:#ef4444">*</span></label>
      <input type="text" id="address-input" placeholder="東京都千代田区千代田1-1">
    </div>

    <div style="margin-top: 8px;">
      <button id="submit-btn" type="button">申請する</button>
    </div>
  </div>

  <script src="/embed.js"></script>
  <script>
    const isPreviewMode = new URLSearchParams(location.search).has('preview')
    if (!isPreviewMode) {
      TetsuzukiQuest.start('./demo-scenario.json')
    }
    // postMessage リスナーは embed.js が自動登録するため追記不要
  </script>
</body>
</html>
